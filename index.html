<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth + Cloud Storage</title>
    <style>
        /* Стили из предыдущего шага + новые для Auth */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #667eea; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Скрытие элементов */
        .hidden { display: none !important; }
        
        #user-profile { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; justify-content: space-between; }
        #user-profile img { width: 40px; height: 40px; border-radius: 50%; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-login { background: #4285F4; color: white; width: 100%; }
        .btn-logout { background: #f44336; color: white; font-size: 12px; }
        .btn-send { background: #764ba2; color: white; width: 100%; margin-top: 10px; }
        
        .message-card { background: #fff; padding: 15px; border-radius: 10px; margin-top: 10px; }
        input[type="file"] { margin: 10px 0; }
        .post-img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <div id="auth-section">
            <button id="loginBtn" class="btn btn-login">Войти через Google</button>
        </div>
        
        <div id="user-section" class="hidden">
            <div id="user-profile">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img id="userPhoto" src="" alt="avatar">
                    <span id="userNameDisplay"></span>
                </div>
                <button id="logoutBtn" class="btn btn-logout">Выйти</button>
            </div>

            <form id="feedbackForm">
                <input type="text" id="postText" placeholder="Что у вас нового?" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                <input type="file" id="imageInput" accept="image/*">
                <button type="submit" id="submitBtn" class="btn btn-send">Опубликовать</button>
            </form>
        </div>
    </div>

    <div id="messages-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCpKr0rUwBevRyGkVgj4qbaXC3AKZf0HB0",
  authDomain: "project-4205512530464736582.firebaseapp.com",
  projectId: "project-4205512530464736582",
  storageBucket: "project-4205512530464736582.firebasestorage.app",
  messagingSenderId: "765026109468",
  appId: "1:765026109468:web:b84456640c87599af277d9",
  measurementId: "G-H9NL58CQ4Y"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    // --- ЛОГИКА АВТОРИЗАЦИИ ---
    loginBtn.onclick = () => signInWithPopup(auth, provider);
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            userSection.classList.remove('hidden');
            authSection.classList.add('hidden');
            userPhoto.src = user.photoURL;
            userNameDisplay.innerText = user.displayName;
        } else {
            currentUser = null;
            userSection.classList.add('hidden');
            authSection.classList.remove('hidden');
        }
    });

    // --- ЭТАП V: ЗАГРУЗКА КАРТИНКИ + ПОСТ ---
    feedbackForm.onsubmit = async (e) => {
        e.preventDefault();
        const text = postText.value;
        const file = imageInput.files[0];
        let imageUrl = null;

        submitBtn.disabled = true;
        submitBtn.innerText = "Загрузка...";

        try {
            // Если есть файл, сначала грузим в Storage
            if (file) {
                const storageRef = ref(storage, `images/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                imageUrl = await getDownloadURL(storageRef);
            }

            // Пишем в Firestore
            await addDoc(collection(db, "requests"), {
                name: currentUser.displayName,
                text: text,
                image: imageUrl,
                uid: currentUser.uid,
                timestamp: serverTimestamp(),
                likes: 0
            });

            feedbackForm.reset();
        } catch (err) {
            alert("Ошибка доступа! Проверьте Rules.");
            console.error(err);
        }
        submitBtn.disabled = false;
        submitBtn.innerText = "Опубликовать";
    };

    // --- РЕНДЕР ЛЕНТЫ ---
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        messagesList.innerHTML = "";
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const card = document.createElement('div');
            card.className = 'message-card card';
            card.innerHTML = `
                <strong>${data.name}</strong>
                <p>${data.text}</p>
                ${data.image ? `<img src="${data.image}" class="post-img">` : ''}
            `;
            messagesList.appendChild(card);
        });
    });
</script>
</body>
</html>
