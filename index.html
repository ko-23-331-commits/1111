<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #dfa400; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, 
        query, orderBy, updateDoc, doc, increment, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCpKr0rUwBevRyGkVgj4qbaXC3AKZf0HB0",
  authDomain: "project-4205512530464736582.firebaseapp.com",
  projectId: "project-4205512530464736582",
  storageBucket: "project-4205512530464736582.firebasestorage.app",
  messagingSenderId: "765026109468",
  appId: "1:765026109468:web:b84456640c87599af277d9",
  measurementId: "G-H9NL58CQ4Y"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. ОТПРАВКА ДАННЫХ
    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("userName").value;
        const email = document.getElementById("userEmail").value;

        try {
            await addDoc(collection(db, "requests"), {
                name,
                email,
                likes: 0,
                timestamp: serverTimestamp() // Используем время сервера для точности
            });
            document.getElementById("feedbackForm").reset();
        } catch (e) { console.error("Ошибка:", e); }
    });

    // 2. РЕАКТИВНОЕ ОБНОВЛЕНИЕ (Real-time)
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const container = document.getElementById("messages-list") || createContainer();
        container.innerHTML = ""; // Очищаем перед обновлением

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const div = document.createElement("div");
            div.className = "message-card";
            div.innerHTML = `
                <p><strong>${data.name}</strong>: ${data.email}</p>
                <button onclick="window.likePost('${docSnap.id}')">❤️ ${data.likes || 0}</button>
                <hr>
            `;
            container.appendChild(div);
        });
    });

    // 3. АТОМАРНЫЙ ЛАЙК
    window.likePost = async (id) => {
        const docRef = doc(db, "requests", id);
        await updateDoc(docRef, {
            likes: increment(1) // Гарантирует корректный счет при 1000 кликах в сек.
        });
    };

    function createContainer() {
        const div = document.createElement("div");
        div.id = "messages-list";
        div.style.marginTop = "20px";
        document.body.appendChild(div);
        return div;
    }
</script>
</body>
</html>
